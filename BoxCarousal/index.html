<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Box Carousel - 3D Cube Component</title>
  <style>
    :root {
      /* Modern Minimal Palette */
      --bg:      oklch(99% 0.002 240);
      --surface: oklch(100% 0 0);
      --fg:      oklch(18% 0.012 250);
      --muted:   oklch(54% 0.012 250);
      --border:  oklch(92% 0.005 250);
      --accent:  oklch(58% 0.18 255);

      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      --font-body:    -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;

      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      overflow-x: hidden;
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--muted);
      font-size: 1.1rem;
    }

    /* Tweaks Panel */
    .tweaks-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      z-index: 1000;
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .tweaks-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .tweak-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .tweak-label {
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
    }

    .tweak-control input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .tweak-control select {
      width: 100%;
      padding: 0.4rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.85rem;
    }

    .controls-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 2rem;
    }

    .btn {
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      border: 1px solid var(--fg);
      background: transparent;
      color: var(--fg);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover {
      background: var(--fg);
      color: var(--surface);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-icon {
      width: 16px;
      height: 16px;
    }

    /* Media Renderer Styles */
    .media-container {
      width: 100%;
      height: 100%;
      position: relative;
      background: var(--surface);
    }

    .media-item {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .debug-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 2rem;
      background: rgba(0,0,0,0.1);
      border: 1px dashed var(--muted);
    }

    /* Utilities */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- Pinned React and Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  
  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@11.11.11/dist/framer-motion.js"></script>

  <script type="text/babel">
    const { 
      useState, 
      useRef, 
      useCallback, 
      useEffect, 
      useMemo, 
      useImperativeHandle, 
      forwardRef, 
      memo 
    } = React;
    const { 
      motion, 
      useMotionValue, 
      useSpring, 
      useTransform, 
      animate, 
      useReducedMotion,
      AnimatePresence
    } = Motion;

    // --- Helper Components ---
    
    const cn = (...classes) => classes.filter(Boolean).join(' ');

    const CubeFace = memo(({ transform, className, children, style, debug }) => (
      <div
        className={cn(
          "absolute overflow-hidden",
          debug && "backface-visible opacity-50",
          className
        )}
        style={{ transform, ...style }}
      >
        {children}
      </div>
    ));

    const MediaRenderer = memo(({ item, debug = false }) => {
      if (!debug) {
        if (item.type === "video") {
          return (
            <video
              src={item.src}
              poster={item.poster}
              className="media-item"
              muted
              loop
              autoPlay
              playsInline
            />
          );
        }

        return (
          <img
            src={item.src}
            alt={item.alt || ""}
            draggable={false}
            className="media-item"
          />
        );
      }

      return (
        <div className="debug-overlay">
          {item.id}
        </div>
      );
    });

    // --- Main BoxCarousel Component ---

    const BoxCarousel = forwardRef((
      {
        items,
        width,
        height,
        className,
        perspective = 600,
        debug = false,
        direction = "left",
        transition = { duration: 1.25, ease: [0.953, 0.001, 0.019, 0.995] },
        snapTransition = { type: "spring", damping: 30, stiffness: 200 },
        dragSpring = { stiffness: 200, damping: 30 },
        autoPlay = false,
        autoPlayInterval = 3000,
        onIndexChange,
        enableDrag = true,
        dragSensitivity = 0.5,
        ...props
      },
      ref
    ) => {
      const [currentItemIndex, setCurrentItemIndex] = useState(0);
      const [currentFrontFaceIndex, setCurrentFrontFaceIndex] = useState(1);

      const prefersReducedMotion = useReducedMotion();
      const _transition = prefersReducedMotion ? { duration: 0 } : transition;

      const [prevIndex, setPrevIndex] = useState(items.length - 1);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [nextIndex, setNextIndex] = useState(1);
      const [afterNextIndex, setAfterNextIndex] = useState(2);

      const [currentRotation, setCurrentRotation] = useState(0);

      const rotationCount = useRef(1);
      const isRotating = useRef(false);
      const pendingIndexChange = useRef(null);
      const isDragging = useRef(false);
      const startPosition = useRef({ x: 0, y: 0 });
      const startRotation = useRef(0);

      const baseRotateX = useMotionValue(0);
      const baseRotateY = useMotionValue(0);

      const springRotateX = useSpring(baseRotateX, dragSpring);
      const springRotateY = useSpring(baseRotateY, dragSpring);

      const handleAnimationComplete = useCallback((triggeredBy) => {
        if (isRotating.current && pendingIndexChange.current !== null) {
          isRotating.current = false;

          let newFrontFaceIndex;
          let currentBackFaceIndex;

          if (triggeredBy === "next") {
            newFrontFaceIndex = (currentFrontFaceIndex + 1) % 4;
            currentBackFaceIndex = (newFrontFaceIndex + 2) % 4;
          } else {
            newFrontFaceIndex = (currentFrontFaceIndex - 1 + 4) % 4;
            currentBackFaceIndex = (newFrontFaceIndex + 3) % 4;
          }

          setCurrentItemIndex(pendingIndexChange.current);
          onIndexChange?.(pendingIndexChange.current);

          const indexOffset = triggeredBy === "next" ? 2 : -1;

          if (currentBackFaceIndex === 0) {
            setPrevIndex((pendingIndexChange.current + indexOffset + items.length) % items.length);
          } else if (currentBackFaceIndex === 1) {
            setCurrentIndex((pendingIndexChange.current + indexOffset + items.length) % items.length);
          } else if (currentBackFaceIndex === 2) {
            setNextIndex((pendingIndexChange.current + indexOffset + items.length) % items.length);
          } else if (currentBackFaceIndex === 3) {
            setAfterNextIndex((pendingIndexChange.current + indexOffset + items.length) % items.length);
          }

          pendingIndexChange.current = null;
          rotationCount.current++;
          setCurrentFrontFaceIndex(newFrontFaceIndex);
        }
      }, [currentFrontFaceIndex, items.length, onIndexChange]);

      const handleDragStart = useCallback((e) => {
        if (!enableDrag || isRotating.current) return;
        isDragging.current = true;
        const point = e.touches ? e.touches[0] : e;
        startPosition.current = { x: point.clientX, y: point.clientY };
        startRotation.current = currentRotation;
        // preventDefault might interfere with scrolling if not careful, but component needs it
      }, [enableDrag, currentRotation]);

      const handleDragMove = useCallback((e) => {
        if (!isDragging.current || isRotating.current) return;

        const point = e.touches ? e.touches[0] : e;
        const deltaX = point.clientX - startPosition.current.x;
        const deltaY = point.clientY - startPosition.current.y;

        const isVertical = direction === "top" || direction === "bottom";
        const delta = isVertical ? deltaY : deltaX;
        const rotationDelta = (delta * dragSensitivity) / 2;

        let newRotation = startRotation.current;

        if (direction === "top" || direction === "right") {
          newRotation += rotationDelta;
        } else {
          newRotation -= rotationDelta;
        }

        const minRotation = startRotation.current - 120;
        const maxRotation = startRotation.current + 120;
        newRotation = Math.max(minRotation, Math.min(maxRotation, newRotation));

        if (isVertical) {
          baseRotateX.set(newRotation);
        } else {
          baseRotateY.set(newRotation);
        }
      }, [direction, dragSensitivity]);

      const handleDragEnd = useCallback(() => {
        if (!isDragging.current) return;
        isDragging.current = false;

        const isVertical = direction === "top" || direction === "bottom";
        const currentValue = isVertical ? baseRotateX.get() : baseRotateY.get();

        const quarterRotations = Math.round(currentValue / 90);
        const snappedRotation = quarterRotations * 90;

        const rotationDifference = snappedRotation - currentRotation;
        const steps = Math.round(rotationDifference / 90);

        if (steps !== 0) {
          isRotating.current = true;
          let newItemIndex = currentItemIndex;
          for (let i = 0; i < Math.abs(steps); i++) {
            if (steps > 0) {
              newItemIndex = (newItemIndex + 1) % items.length;
            } else {
              newItemIndex = newItemIndex === 0 ? items.length - 1 : newItemIndex - 1;
            }
          }
          pendingIndexChange.current = newItemIndex;

          const targetMotionValue = isVertical ? baseRotateX : baseRotateY;
          animate(targetMotionValue, snappedRotation, {
            ...snapTransition,
            onComplete: () => {
              handleAnimationComplete(steps > 0 ? "next" : "prev");
              setCurrentRotation(snappedRotation);
            },
          });
        } else {
          const targetMotionValue = isVertical ? baseRotateX : baseRotateY;
          animate(targetMotionValue, currentRotation, snapTransition);
        }
      }, [direction, baseRotateX, baseRotateY, currentRotation, currentItemIndex, items.length, handleAnimationComplete]);

      useEffect(() => {
        if (enableDrag) {
          const move = (e) => handleDragMove(e);
          const end = () => handleDragEnd();
          window.addEventListener("mousemove", move);
          window.addEventListener("mouseup", end);
          window.addEventListener("touchmove", move);
          window.addEventListener("touchend", end);
          return () => {
            window.removeEventListener("mousemove", move);
            window.removeEventListener("mouseup", end);
            window.removeEventListener("touchmove", move);
            window.removeEventListener("touchend", end);
          };
        }
      }, [enableDrag, handleDragMove, handleDragEnd]);

      const next = useCallback(() => {
        if (items.length === 0 || isRotating.current) return;
        isRotating.current = true;
        const newIndex = (currentItemIndex + 1) % items.length;
        pendingIndexChange.current = newIndex;

        if (direction === "top") {
          animate(baseRotateX, currentRotation + 90, { ..._transition, onComplete: () => { handleAnimationComplete("next"); setCurrentRotation(currentRotation + 90); } });
        } else if (direction === "bottom") {
          animate(baseRotateX, currentRotation - 90, { ..._transition, onComplete: () => { handleAnimationComplete("next"); setCurrentRotation(currentRotation - 90); } });
        } else if (direction === "left") {
          animate(baseRotateY, currentRotation - 90, { ..._transition, onComplete: () => { handleAnimationComplete("next"); setCurrentRotation(currentRotation - 90); } });
        } else if (direction === "right") {
          animate(baseRotateY, currentRotation + 90, { ..._transition, onComplete: () => { handleAnimationComplete("next"); setCurrentRotation(currentRotation + 90); } });
        }
      }, [items.length, direction, _transition, currentRotation, handleAnimationComplete, currentItemIndex]);

      const prev = useCallback(() => {
        if (items.length === 0 || isRotating.current) return;
        isRotating.current = true;
        const newIndex = currentItemIndex === 0 ? items.length - 1 : currentItemIndex - 1;
        pendingIndexChange.current = newIndex;

        if (direction === "top") {
          animate(baseRotateX, currentRotation - 90, { ..._transition, onComplete: () => { handleAnimationComplete("prev"); setCurrentRotation(currentRotation - 90); } });
        } else if (direction === "bottom") {
          animate(baseRotateX, currentRotation + 90, { ..._transition, onComplete: () => { handleAnimationComplete("prev"); setCurrentRotation(currentRotation + 90); } });
        } else if (direction === "left") {
          animate(baseRotateY, currentRotation + 90, { ..._transition, onComplete: () => { handleAnimationComplete("prev"); setCurrentRotation(currentRotation + 90); } });
        } else if (direction === "right") {
          animate(baseRotateY, currentRotation - 90, { ..._transition, onComplete: () => { handleAnimationComplete("prev"); setCurrentRotation(currentRotation - 90); } });
        }
      }, [items.length, direction, _transition, currentRotation, handleAnimationComplete, currentItemIndex]);

      useImperativeHandle(ref, () => ({
        next,
        prev,
        getCurrentItemIndex: () => currentItemIndex,
      }), [next, prev, currentItemIndex]);

      const depth = useMemo(() => (direction === "top" || direction === "bottom" ? height : width), [direction, width, height]);

      const transform = useTransform(
        isDragging.current ? [springRotateX, springRotateY] : [baseRotateX, baseRotateY],
        ([x, y]) => `translateZ(-${depth / 2}px) rotateX(${x}deg) rotateY(${y}deg)`
      );

      const faceTransforms = useMemo(() => {
        switch (direction) {
          case "left":
            return [
              `rotateY(-90deg) translateZ(${width / 2}px)`,
              `rotateY(0deg) translateZ(${depth / 2}px)`,
              `rotateY(90deg) translateZ(${width / 2}px)`,
              `rotateY(180deg) translateZ(${depth / 2}px)`,
            ];
          case "top":
            return [
              `rotateX(90deg) translateZ(${height / 2}px)`,
              `rotateY(0deg) translateZ(${depth / 2}px)`,
              `rotateX(-90deg) translateZ(${height / 2}px)`,
              `rotateY(180deg) translateZ(${depth / 2}px) rotateZ(180deg)`,
            ];
          case "right":
            return [
              `rotateY(90deg) translateZ(${width / 2}px)`,
              `rotateY(0deg) translateZ(${depth / 2}px)`,
              `rotateY(-90deg) translateZ(${width / 2}px)`,
              `rotateY(180deg) translateZ(${depth / 2}px)`,
            ];
          case "bottom":
            return [
              `rotateX(-90deg) translateZ(${height / 2}px)`,
              `rotateY(0deg) translateZ(${depth / 2}px)`,
              `rotateX(90deg) translateZ(${height / 2}px)`,
              `rotateY(180deg) translateZ(${depth / 2}px) rotateZ(180deg)`,
            ];
          default:
            return [
              `rotateY(-90deg) translateZ(${width / 2}px)`,
              `rotateY(0deg) translateZ(${depth / 2}px)`,
              `rotateY(90deg) translateZ(${width / 2}px)`,
              `rotateY(180deg) translateZ(${depth / 2}px)`,
            ];
        }
      }, [direction, width, height, depth]);

      useEffect(() => {
        if (autoPlay && items.length > 0) {
          const interval = setInterval(next, autoPlayInterval);
          return () => clearInterval(interval);
        }
      }, [autoPlay, items.length, next, autoPlayInterval]);

      const handleKeyDown = useCallback((e) => {
        if (isRotating.current) return;
        switch (e.key) {
          case "ArrowLeft":
            if (direction === "left" || direction === "right") { e.preventDefault(); prev(); }
            break;
          case "ArrowRight":
            if (direction === "left" || direction === "right") { e.preventDefault(); next(); }
            break;
          case "ArrowUp":
            if (direction === "top" || direction === "bottom") { e.preventDefault(); prev(); }
            break;
          case "ArrowDown":
            if (direction === "top" || direction === "bottom") { e.preventDefault(); next(); }
            break;
        }
      }, [direction, next, prev]);

      return (
        <div
          className={cn("relative focus:outline-none", enableDrag && "cursor-move", className)}
          style={{ width, height, perspective: `${perspective}px` }}
          onKeyDown={handleKeyDown}
          tabIndex={0}
          onMouseDown={handleDragStart}
          onTouchStart={handleDragStart}
          {...props}
        >
          <motion.div
            className="relative w-full h-full"
            style={{ transform, transformStyle: "preserve-3d" }}
          >
            <CubeFace transform={faceTransforms[0]} style={{ width, height }} debug={debug}>
              <MediaRenderer item={items[prevIndex]} debug={debug} />
            </CubeFace>
            <CubeFace transform={faceTransforms[1]} style={{ width, height }} debug={debug}>
              <MediaRenderer item={items[currentIndex]} debug={debug} />
            </CubeFace>
            <CubeFace transform={faceTransforms[2]} style={{ width, height }} debug={debug}>
              <MediaRenderer item={items[nextIndex]} debug={debug} />
            </CubeFace>
            <CubeFace transform={faceTransforms[3]} style={{ width, height }} debug={debug}>
              <MediaRenderer item={items[afterNextIndex]} debug={debug} />
            </CubeFace>
          </motion.div>
        </div>
      );
    }));

    // --- Demo Application ---

    const carouselItems = [
      { id: "1", type: "image", src: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1000", alt: "Abstract mesh" },
      { id: "2", type: "image", src: "https://images.unsplash.com/photo-1633167606207-d840b5070fc2?auto=format&fit=crop&q=80&w=1000", alt: "Fluid chrome" },
      { id: "3", type: "image", src: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=1000", alt: "Geometric shapes" },
      { id: "4", type: "image", src: "https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&q=80&w=1000", alt: "Deep gradient" },
      { id: "5", type: "image", src: "https://images.unsplash.com/photo-1617791160505-6f00504e3519?auto=format&fit=crop&q=80&w=1000", alt: "Liquid metal" },
      { id: "6", type: "image", src: "https://images.unsplash.com/photo-1635776062127-d3ad4afb7984?auto=format&fit=crop&q=80&w=1000", alt: "Noise grain" },
    ];

    function App() {
      const carouselRef = useRef(null);
      const [currentIndex, setCurrentIndex] = useState(0);
      
      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
        "width": 400,
        "height": 300,
        "direction": "left",
        "perspective": 1000,
        "autoPlay": false,
        "debug": false,
        "sensitivity": 0.5
      }/*EDITMODE-END*/;

      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

      const updateTweak = (key, val) => setTweaks(prev => ({ ...prev, [key]: val }));

      return (
        <div className="container">
          <div className="header">
            <h1>Box Carousel</h1>
            <p>A 3D rotating cube layout for mixed media.</p>
          </div>

          <BoxCarousel
            ref={carouselRef}
            items={carouselItems}
            width={tweaks.width}
            height={tweaks.height}
            direction={tweaks.direction}
            perspective={tweaks.perspective}
            autoPlay={tweaks.autoPlay}
            debug={tweaks.debug}
            dragSensitivity={tweaks.sensitivity}
            onIndexChange={setCurrentIndex}
            className="carousel-main"
          />

          <div className="controls-row">
            <button className="btn" onClick={() => carouselRef.current?.prev()}>
              Prev
            </button>
            <button className="btn" onClick={() => carouselRef.current?.next()}>
              Next
            </button>
          </div>

          <div className="tweaks-panel">
            <div className="tweaks-title">Configuration</div>
            
            <div className="tweak-group">
              <label className="tweak-label">
                <span>Width</span>
                <span>{tweaks.width}px</span>
              </label>
              <div className="tweak-control">
                <input type="range" min="200" max="800" step="10" value={tweaks.width} onChange={e => updateTweak('width', parseInt(e.target.value))} />
              </div>
            </div>

            <div className="tweak-group">
              <label className="tweak-label">
                <span>Height</span>
                <span>{tweaks.height}px</span>
              </label>
              <div className="tweak-control">
                <input type="range" min="150" max="600" step="10" value={tweaks.height} onChange={e => updateTweak('height', parseInt(e.target.value))} />
              </div>
            </div>

            <div className="tweak-group">
              <label className="tweak-label">Direction</label>
              <div className="tweak-control">
                <select value={tweaks.direction} onChange={e => updateTweak('direction', e.target.value)}>
                  <option value="left">Left</option>
                  <option value="right">Right</option>
                  <option value="top">Top</option>
                  <option value="bottom">Bottom</option>
                </select>
              </div>
            </div>

            <div className="tweak-group">
              <label className="tweak-label">
                <span>Perspective</span>
                <span>{tweaks.perspective}px</span>
              </label>
              <div className="tweak-control">
                <input type="range" min="400" max="2000" step="100" value={tweaks.perspective} onChange={e => updateTweak('perspective', parseInt(e.target.value))} />
              </div>
            </div>

            <div className="tweak-group" style={{ flexDirection: 'row', justifyContent: 'space-between', alignItems: 'center' }}>
              <label className="tweak-label">Auto Play</label>
              <input type="checkbox" checked={tweaks.autoPlay} onChange={e => updateTweak('autoPlay', e.target.checked)} />
            </div>

            <div className="tweak-group" style={{ flexDirection: 'row', justifyContent: 'space-between', alignItems: 'center' }}>
              <label className="tweak-label">Debug Mode</label>
              <input type="checkbox" checked={tweaks.debug} onChange={e => updateTweak('debug', e.target.checked)} />
            </div>
          </div>

          <div style={{ position: 'fixed', bottom: '24px', left: '24px', color: var(--muted), fontSize: '0.8rem', fontFamily: 'var(--font-mono)' }}>
            ITEM {currentIndex + 1} / {carouselItems.length}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);
  </script>
</body>
</html>
