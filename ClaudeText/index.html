<style>
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;padding:2rem 1rem}
.card{
  background:var(--color-background-primary);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-lg);
  padding:1.25rem;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:border-color 0.25s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  transform-style:preserve-3d;
}
.card:hover{
  border-color:var(--color-border-primary);
  transform:translateY(-6px) scale(1.02);
}
.card-shine{
  position:absolute;
  inset:0;
  border-radius:var(--border-radius-lg);
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.12) 0%, transparent 65%);
  opacity:0;
  transition:opacity 0.3s ease;
  pointer-events:none;
}
.card:hover .card-shine{opacity:1}
.card-icon{
  width:40px;height:40px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  margin-bottom:14px;
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.card:hover .card-icon{transform:rotate(-8deg) scale(1.15)}
.card-label{
  font-size:13px;
  color:var(--color-text-secondary);
  margin:0 0 4px;
  font-weight:400;
}
.card-value{
  font-size:22px;
  font-weight:500;
  color:var(--color-text-primary);
  margin:0 0 10px;
  transition:letter-spacing 0.25s ease;
}
.card:hover .card-value{letter-spacing:0.02em}
.card-bar-track{
  height:4px;
  background:var(--color-background-tertiary);
  border-radius:2px;
  overflow:hidden;
}
.card-bar{
  height:100%;
  border-radius:2px;
  width:0%;
  transition:width 0.6s cubic-bezier(0.4,0,0.2,1);
}
.card:hover .card-bar{width:var(--pct)}
.card-delta{
  font-size:12px;
  margin-top:8px;
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:2px 8px;
  border-radius:99px;
  font-weight:500;
  opacity:0;
  transform:translateY(4px);
  transition:opacity 0.25s ease 0.1s, transform 0.25s ease 0.1s;
}
.card:hover .card-delta{opacity:1;transform:translateY(0)}
.up{background:var(--color-background-success);color:var(--color-text-success)}
.down{background:var(--color-background-danger);color:var(--color-text-danger)}
</style>

<h2 class="sr-only">Metric cards with hover microanimations — hover each card to reveal bar fill and delta badge</h2>

<div class="card-grid">

  <div class="card" onmousemove="shine(event,this)">
    <div class="card-shine"></div>
    <div class="card-icon" style="background:#E6F1FB;color:#185FA5"><i class="ti ti-users" aria-hidden="true"></i></div>
    <p class="card-label">Active users</p>
    <p class="card-value">24,819</p>
    <div class="card-bar-track"><div class="card-bar" style="--pct:72%;background:#378ADD"></div></div>
    <span class="card-delta up"><i class="ti ti-trending-up" aria-hidden="true"></i> +12.4%</span>
  </div>

  <div class="card" onmousemove="shine(event,this)">
    <div class="card-shine"></div>
    <div class="card-icon" style="background:#EAF3DE;color:#3B6D11"><i class="ti ti-coin" aria-hidden="true"></i></div>
    <p class="card-label">Revenue</p>
    <p class="card-value">$84.2k</p>
    <div class="card-bar-track"><div class="card-bar" style="--pct:58%;background:#639922"></div></div>
    <span class="card-delta up"><i class="ti ti-trending-up" aria-hidden="true"></i> +8.1%</span>
  </div>

  <div class="card" onmousemove="shine(event,this)">
    <div class="card-shine"></div>
    <div class="card-icon" style="background:#FAEEDA;color:#854F0B"><i class="ti ti-clock" aria-hidden="true"></i></div>
    <p class="card-label">Avg. session</p>
    <p class="card-value">4m 38s</p>
    <div class="card-bar-track"><div class="card-bar" style="--pct:43%;background:#EF9F27"></div></div>
    <span class="card-delta down"><i class="ti ti-trending-down" aria-hidden="true"></i> −2.3%</span>
  </div>

  <div class="card" onmousemove="shine(event,this)">
    <div class="card-shine"></div>
    <div class="card-icon" style="background:#EEEDFE;color:#534AB7"><i class="ti ti-star" aria-hidden="true"></i></div>
    <p class="card-label">Satisfaction</p>
    <p class="card-value">4.87</p>
    <div class="card-bar-track"><div class="card-bar" style="--pct:87%;background:#7F77DD"></div></div>
    <span class="card-delta up"><i class="ti ti-trending-up" aria-hidden="true"></i> +0.2</span>
  </div>

</div>

<script>
function shine(e,card){
  const r=card.getBoundingClientRect();
  const x=((e.clientX-r.left)/r.width*100).toFixed(1)+'%';
  const y=((e.clientY-r.top)/r.height*100).toFixed(1)+'%';
  card.style.setProperty('--mx',x);
  card.style.setProperty('--my',y);
}
</script>
