<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Design Testing Lab</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #0f172a; /* Sleek dark mode base */
            color: #f8fafc;
            overflow: hidden;
        }

        /* Fixed Sidebar Styling */
        .sidebar {
            width: 260px;
            background-color: #1e293b;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
        }
        .sidebar h2 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 24px;
            padding-left: 8px;
        }
        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        /* Crucial: The target attribute on these links matches the iframe name */
        .menu-item a {
            display: block;
            padding: 10px 12px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .menu-item a:hover {
            background-color: #334155;
            color: #ffffff;
        }
        .menu-item a:focus, .menu-item a.active {
            background-color: #3b82f6;
            color: #ffffff;
        }

        /* Preview Canvas Viewport */
        .main-content {
            flex: 1;
            height: 100%;
            background-color: #0f172a;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: transparent;
        }
    </style>
</head>
<body>

    <!-- Left Navigation Sidebar -->
    <nav class="sidebar">
        <h2>Component Lab</h2>
        <ul class="menu-list">
            <!-- 
              To add new components, just add an <li> here. 
              The href points to the folder, and target="preview-canvas" tells the iframe to load it.
            -->
            <li class="menu-item">
                <a href="./glass-card/" target="preview-canvas">🔮 Glassmorphism Card</a>
            </li>
            <li class="menu-item">
                <a href="./neon-button/" target="preview-canvas">⚡ Neon Button</a>
            </li>
        </ul>
    </nav>

    <!-- Right Display Window -->
    <main class="main-content">
        <!-- name="preview-canvas" is what links this window to your sidebar links -->
        <iframe name="preview-canvas" src="about:blank" title="Component Preview"></iframe>
    </main>

    <script>
        // Optional quick script to add visual active state to the clicked menu item
        const links = document.querySelectorAll('.menu-item a');
        links.forEach(link => {
            link.addEventListener('click', () => {
                links.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
            });
        });
        
        // Auto-load the first component on launch if one exists
        if(links.length > 0) {
            links[0].click();
        }
    </script>
</body>
</html>
